[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

[[redirects]]
  from = "/api/habits"
  to = "/.netlify/functions/habits"
  status = 200
